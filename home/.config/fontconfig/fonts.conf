<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- CJK Han-disambiguation: pick the right regional Noto CJK by lang
       (they all cover the same codepoints, so gate on lang). -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-cn</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK SC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-tw</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK TC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-hk</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK KR</string></edit>
  </match>

  <!-- Generic fallback chains. Noto Nastaliq Urdu sits BEFORE the Arabic
       fonts so Arabic-script text falls to Nastaliq (Urdu-primary). -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Adwaita Sans</family>
      <family>Noto Sans</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans Thai</family>
      <family>Noto Sans Bengali</family>
      <family>Noto Nastaliq Urdu</family>
      <family>Noto Sans Arabic</family>
      <family>Liberation Sans</family>
      <family>DejaVu Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Sans Thai</family>
      <family>Noto Sans Bengali</family>
      <family>Noto Nastaliq Urdu</family>
      <family>Noto Naskh Arabic</family>
      <family>Liberation Serif</family>
      <family>DejaVu Serif</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Adwaita Mono</family>
      <family>Noto Sans Mono</family>
      <family>Noto Sans Mono CJK JP</family>
      <family>Noto Nastaliq Urdu</family>
      <family>Noto Sans Arabic</family>
      <family>Liberation Mono</family>
      <family>DejaVu Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- web system-font keywords -->
  <alias>
    <family>-apple-system</family>
    <prefer><family>Adwaita Sans</family><family>Noto Nastaliq Urdu</family></prefer>
  </alias>
  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer><family>Adwaita Sans</family><family>Noto Nastaliq Urdu</family></prefer>
  </alias>

  <!-- Force Nastaliq for Urdu (lang=ur): fontconfig down-ranks it otherwise. -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ur</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Nastaliq Urdu</string></edit>
  </match>

  <!-- UNTAGGED Arabic-script: fontconfig penalizes Nastaliq (lang=ur only) under
       a non-ur locale, so the weak prefer-chain loses to Noto Sans Arabic and
       Urdu renders Naskh. Force Nastaliq with STRONG binding on the generics.
       Latin/CJK are unaffected — Nastaliq has no glyphs for them so Pango's
       per-glyph fallback skips it. -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Nastaliq Urdu</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Nastaliq Urdu</string></edit>
  </match>

  <!-- emoji generic + cross-platform emoji font names -> Noto Color Emoji -->
  <match target="pattern">
    <test qual="any" name="family"><string>emoji</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Color Emoji</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Apple Color Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Noto Color Emoji</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Segoe UI Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Noto Color Emoji</string></edit>
  </match>

</fontconfig>
