# Laptop, left, centered vertically (Y = (1440 − 1080) ÷ 2)
output eDP-1 {
    mode 1920x1080@60Hz
    position 0 180
    scale 1
    transform normal
}

# External monitor (Lenovo P24q), right (X = 1920, after the laptop)
output HDMI-A-1 {
    mode 2560x1440@60Hz
    position 1920 0
    scale 1
    transform normal
}
