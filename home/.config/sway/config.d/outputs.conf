# ─────────────────────────────────────────────────────────────────────────────
#  MONITOR LAYOUT  —  edit the numbers, save & quit (:wq), Sway re-applies.
#  Fast way to open this file: click the brightness  %  on the bar.
#
#  position X Y   →   X = LEFT/RIGHT   ·   Y = UP/DOWN
#     • X: the leftmost screen is 0. The screen to its RIGHT starts at
#          X = (width of the left screen).  Here the laptop (1920 wide) is on
#          the left, so the monitor to its right starts at X = 1920.
#     • Y: 0 = tops line up.  A BIGGER Y pushes that screen DOWN.
#          To CENTER a shorter screen next to a taller one:
#              Y = (taller_height − shorter_height) ÷ 2
#          e.g. 1440 vs 1080  →  (1440 − 1080) ÷ 2 = 180   ← centered
#
#  mode WxH@RHz   →   resolution + refresh   (list options: swaymsg -t get_outputs)
#  scale N        →   1 = 100 %,  1.5 = 150 % (for HiDPI / tiny text)
#  transform T    →   rotation — normally leave "normal":
#                     normal | 90 | 180 | 270    (90/270 = portrait, 180 = upside-down)
# ─────────────────────────────────────────────────────────────────────────────

# ── Laptop screen (1920×1080) — on the LEFT, centered vertically ─────────────
#    X = 0 (leftmost);  Y = 180 (centered: (1440 − 1080) ÷ 2).  0 = top, 360 = bottom.
output eDP-1 {
    mode 1920x1080@60Hz
    position 0 229
    scale 1.1
    transform normal
}

# ── Big external monitor (Lenovo P24q · 2560×1440) — on the RIGHT ────────────
#    X = 1920 (starts right after the 1920-wide laptop);  Y = 0 (top).
output HDMI-A-1 {
    mode 2560x1440@60Hz
    position 1745 0
    scale 1
    transform normal
}

# ── QUICK RECIPES ────────────────────────────────────────────────────────────
#   Monitor on the LEFT instead:  eDP-1 → position 2560 180  &  HDMI-A-1 → position 0 0
#   Line the tops up:             eDP-1 → position 0 0
#   Line the bottoms up:          eDP-1 → position 0 360
#   Nudge the laptop lower:       raise the eDP-1 Y number (e.g. 250)
#   Turn a monitor portrait:      that output → transform 90   (its width/height swap)
